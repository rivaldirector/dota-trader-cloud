name: Closing Odds Tracker — CLV

on:
  schedule:
    - cron: "*/5 * * * *"   # каждые 5 минут
  workflow_dispatch:

jobs:
  track:
    runs-on: ubuntu-latest
    timeout-minutes: 8

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install requests python-dotenv

      - name: Write .env
        env:
          BETSAPI_TOKEN:     ${{ secrets.BETSAPI_TOKEN }}
          SUPABASE_URL:      ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_KEY }}
        run: |
          echo "BETSAPI_TOKEN=${BETSAPI_TOKEN}"          > .env
          echo "SUPABASE_URL=${SUPABASE_URL}"           >> .env
          echo "SUPABASE_ANON_KEY=${SUPABASE_ANON_KEY}" >> .env

      - name: Track closing odds + CLV
        run: python3 scripts/track_closing_odds.py

      - name: Summary
        if: always()
        run: echo "Closing odds tracker finished at $(date -u)"
