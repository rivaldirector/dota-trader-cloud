name: Prematch Predict — Elo picks + BetsAPI real odds + edge

on:
  schedule:
    - cron: "*/10 * * * *"  # каждые 10 минут — свежие коэфы BetsAPI + новые пики

  workflow_dispatch:

jobs:
  predict:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install requests python-dotenv

      - name: Write .env
        env:
          SUPABASE_URL:      ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_KEY }}
          BETSAPI_TOKEN:     ${{ secrets.BETSAPI_TOKEN }}
        run: |
          echo "SUPABASE_URL=${SUPABASE_URL}"           > .env
          echo "SUPABASE_ANON_KEY=${SUPABASE_ANON_KEY}" >> .env
          echo "BETSAPI_TOKEN=${BETSAPI_TOKEN}"          >> .env

      - name: Elo picks + real odds + edge (BetsAPI если токен задан)
        run: python3 scripts/prematch_free_predict.py

      - name: Summary
        if: always()
        run: echo "Predict pipeline finished at $(date -u)"
