name: Elo Auto Pipeline — autonomous flat-bet decide + settle

on:
  schedule:
    - cron: "*/10 * * * *"   # каждые 10 минут

  workflow_dispatch:

permissions:
  contents: write

jobs:
  auto_pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install requests python-dotenv fastapi starlette

      - name: Write .env
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_KEY }}
          BETSAPI_TOKEN: ${{ secrets.BETSAPI_TOKEN }}
        run: |
          echo "SUPABASE_URL=${SUPABASE_URL}" > .env
          echo "SUPABASE_ANON_KEY=${SUPABASE_ANON_KEY}" >> .env
          echo "BETSAPI_TOKEN=${BETSAPI_TOKEN}" >> .env

      - name: Settle matured AUTO_ELO_FLAT bets (OpenDota, free)
        continue-on-error: true   # OpenDota недоступен — не блокируем bet-шаг ниже
        run: python3 scripts/elo_auto_settle.py

      - name: Place autonomous flat bets on Elo favorites (decide, no review)
        run: python3 scripts/elo_auto_bet.py

      - name: Summary
        if: always()
        run: echo "Elo auto pipeline finished at $(date -u)"
